- name: Ensure /etc/tailscale exists
  become: true
  ansible.builtin.file:
    path: "/etc/tailscale"
    state: directory
    mode: 755

- name: Copy OAuth secret to authkey file
  become: true
  ansible.builtin.copy:
    src: "files/authkey"
    dest: "/etc/tailscale/authkey"
    mode: 600
    owner: root
    group: root

- name: Setup tailscale
  ansible.builtin.include_role:
    name: artis3n.tailscale.machine
  vars:
    tailscale_authkey: "file:/etc/tailscale/authkey"
    tailscale_tags: "{{ pavillion_tailscale_tags }}"
